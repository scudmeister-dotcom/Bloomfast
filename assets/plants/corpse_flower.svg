<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 220" width="160" height="220">
  <!-- Corpse Flower (Amorphophallus titanum): massive dark maroon spathe + tall spadix -->
  <!-- Mottled green/white outer spathe (funnel shape) -->
  <path d="M80 200 Q40 195 20 160 Q10 130 15 100 Q20 70 35 55 Q50 42 65 45 Q75 47 80 50"
        fill="#2d5a27" stroke="#1a3d1a" stroke-width="1.5"/>
  <path d="M80 200 Q120 195 140 160 Q150 130 145 100 Q140 70 125 55 Q110 42 95 45 Q85 47 80 50"
        fill="#2d5a27" stroke="#1a3d1a" stroke-width="1.5"/>
  <!-- Inner spathe - deep maroon/burgundy -->
  <path d="M80 200 Q55 192 42 165 Q32 140 38 110 Q44 82 58 68 Q70 57 80 62"
        fill="#6d1b1b" stroke="#4a0e0e" stroke-width="1"/>
  <path d="M80 200 Q105 192 118 165 Q128 140 122 110 Q116 82 102 68 Q90 57 80 62"
        fill="#6d1b1b" stroke="#4a0e0e" stroke-width="1"/>
  <!-- Deep inner maroon - the opening -->
  <ellipse cx="80" cy="130" rx="22" ry="60" fill="#880e4f"/>
  <!-- Maroon gradient overlay -->
  <path d="M58 75 Q62 65 80 62 Q98 65 102 75 Q110 100 110 135 Q110 165 80 175 Q50 165 50 135 Q50 100 58 75"
        fill="#b71c1c" opacity="0.6"/>
  <!-- Texture stripes on spathe -->
  <g stroke="#4a0e0e" stroke-width="0.8" opacity="0.4" fill="none">
    <path d="M65 70 Q62 100 60 130 Q58 155 62 170"/>
    <path d="M72 65 Q70 95 68 125 Q66 150 68 165"/>
    <path d="M88 65 Q90 95 92 125 Q94 150 92 165"/>
    <path d="M95 70 Q98 100 100 130 Q102 155 98 170"/>
  </g>
  <!-- White mottling on outer spathe -->
  <g fill="#ffffff" opacity="0.15">
    <ellipse cx="35" cy="95" rx="8" ry="5"/><ellipse cx="28" cy="115" rx="6" ry="4"/>
    <ellipse cx="32" cy="135" rx="7" ry="4"/><ellipse cx="40" cy="150" rx="6" ry="3"/>
    <ellipse cx="125" cy="95" rx="8" ry="5"/><ellipse cx="132" cy="115" rx="6" ry="4"/>
    <ellipse cx="128" cy="135" rx="7" ry="4"/><ellipse cx="120" cy="150" rx="6" ry="3"/>
  </g>
  <!-- Central spadix (tall pale yellow column) -->
  <ellipse cx="80" cy="95" rx="10" ry="6" fill="#f5f0d0"/>
  <rect x="74" y="25" width="12" height="75" rx="6" fill="#f5f0d0" stroke="#d4c880" stroke-width="1"/>
  <ellipse cx="80" cy="25" rx="6" ry="4" fill="#e8e0a0"/>
  <!-- Spadix texture -->
  <g fill="#c8b840" opacity="0.3">
    <rect x="75" y="30" width="10" height="2" rx="1"/><rect x="75" y="38" width="10" height="2" rx="1"/>
    <rect x="75" y="46" width="10" height="2" rx="1"/><rect x="75" y="54" width="10" height="2" rx="1"/>
    <rect x="75" y="62" width="10" height="2" rx="1"/><rect x="75" y="70" width="10" height="2" rx="1"/>
    <rect x="75" y="78" width="10" height="2" rx="1"/>
  </g>
  <!-- Radiating smell effect lines (subtle) -->
  <g stroke="#ffd54f" stroke-width="0.8" opacity="0.2" fill="none">
    <line x1="80" y1="22" x2="80" y2="10"/>
    <line x1="80" y1="22" x2="88" y2="12"/><line x1="80" y1="22" x2="72" y2="12"/>
    <line x1="80" y1="22" x2="93" y2="16"/><line x1="80" y1="22" x2="67" y2="16"/>
  </g>
</svg>
