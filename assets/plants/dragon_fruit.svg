    <circle cx="70" cy="136" r="3"/><circle cx="90" cy="136" r="3"/>
  </g>
  <!-- Spines on pads -->
  <g stroke="#fff9c4" stroke-width="1" opacity="0.8" fill="none">
    <line x1="48" y1="155" x2="44" y2="150"/><line x1="48" y1="165" x2="43" y2="162"/>
    <line x1="50" y1="175" x2="45" y2="174"/><line x1="112" y1="155" x2="116" y2="150"/>
    <line x1="112" y1="165" x2="117" y2="162"/><line x1="114" y1="175" x2="119" y2="174"/>
    <line x1="27" y1="110" x2="22" y2="107"/><line x1="26" y1="120" x2="21" y2="119"/>
    <line x1="133" y1="110" x2="138" y2="107"/><line x1="134" y1="120" x2="139" y2="119"/>
  </g>
  <!-- Large white nocturnal flower at top -->
  <!-- Outer petals (long, pointed) -->
  <g fill="#fffde7" stroke="#f9a825" stroke-width="0.8">
    <path d="M80 90 Q77 72 76 55 Q77 42 80 38 Q83 42 84 55 Q83 72 80 90 Z"/>
    <path d="M80 90 Q65 80 54 72 Q45 63 43 58 Q49 57 60 64 Q71 73 80 90 Z"/>
    <path d="M80 90 Q95 80 106 72 Q115 63 117 58 Q111 57 100 64 Q89 73 80 90 Z"/>
    <path d="M80 90 Q68 95 58 92 Q47 86 45 80 Q51 77 62 81 Q73 88 80 90 Z"/>
    <path d="M80 90 Q92 95 102 92 Q113 86 115 80 Q109 77 98 81 Q87 88 80 90 Z"/>
    <path d="M80 90 Q72 76 68 62 Q65 50 68 45 Q73 47 76 60 Q79 74 80 90 Z"/>
    <path d="M80 90 Q88 76 92 62 Q95 50 92 45 Q87 47 84 60 Q81 74 80 90 Z"/>
  </g>
  <!-- Stamens -->
  <g stroke="#f9a825" stroke-width="0.8" fill="none">
    <line x1="80" y1="88" x2="80" y2="72"/><line x1="80" y1="88" x2="74" y2="74"/>
    <line x1="80" y1="88" x2="86" y2="74"/><line x1="80" y1="88" x2="70" y2="78"/>
    <line x1="80" y1="88" x2="90" y2="78"/>
