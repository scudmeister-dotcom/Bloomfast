  <!-- Flower center -->
  <circle cx="80" cy="88" r="7" fill="#fff9c4" stroke="#f9a825" stroke-width="1"/>
  <!-- Dragon fruit (pink spiky fruit) - small, to the right -->
  <ellipse cx="118" cy="158" rx="14" ry="17" fill="#e91e63" stroke="#c2185b" stroke-width="1.5"/>
  <!-- Fruit scales -->
  <g fill="#ad1457" opacity="0.6">
    <path d="M110 148 Q118 140 126 148"/><path d="M107 156 Q118 147 129 156"/>
    <path d="M106 164 Q118 155 130 164"/><path d="M108 172 Q118 163 128 172"/>
  </g>
  <!-- Green scale tips -->
  <g fill="#43a047">
    <path d="M110 148 Q114 143 118 140 Q122 143 126 148 Q122 146 118 148 Q114 146 110 148"/>
    <path d="M107 156 Q111 149 118 147 Q125 149 129 156 Q125 153 118 154 Q111 153 107 156"/>
  </g>
</svg>
