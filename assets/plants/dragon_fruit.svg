<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 220" width="160" height="220">
  <!-- Dragon Fruit Cactus: flat segmented pads, large white flower, spiky pink fruit -->
  <!-- Base soil suggestion -->
  <ellipse cx="80" cy="205" rx="35" ry="10" fill="#3e2723" opacity="0.5"/>
  <!-- Main stem pad (bottom) -->
  <path d="M80 200 Q55 198 48 180 Q42 162 50 148 Q58 136 80 138 Q102 136 110 148 Q118 162 112 180 Q105 198 80 200 Z"
        fill="#388e3c" stroke="#2e7d32" stroke-width="2"/>
  <!-- Wavy edges on main pad -->
  <g fill="#2e7d32" opacity="0.7">
    <circle cx="48" cy="165" r="5"/><circle cx="46" cy="175" r="4.5"/><circle cx="50" cy="155" r="4"/>
    <circle cx="112" cy="165" r="5"/><circle cx="114" cy="175" r="4.5"/><circle cx="110" cy="155" r="4"/>
    <circle cx="65" cy="198" r="4"/><circle cx="80" cy="200" r="4"/><circle cx="95" cy="198" r="4"/>
  </g>
  <!-- Left pad -->
  <path d="M60 148 Q38 150 28 135 Q18 120 24 106 Q30 93 50 90 Q68 88 74 104 Q80 120 72 138 Q66 146 60 148 Z"
        fill="#43a047" stroke="#388e3c" stroke-width="1.5"/>
  <g fill="#388e3c" opacity="0.7">
    <circle cx="27" cy="118" r="4.5"/><circle cx="24" cy="108" r="4"/><circle cx="28" cy="128" r="4"/>
    <circle cx="37" cy="150" r="3.5"/><circle cx="48" cy="88" r="3.5"/>
  </g>
  <!-- Right pad -->
  <path d="M100 148 Q122 150 132 135 Q142 120 136 106 Q130 93 110 90 Q92 88 86 104 Q80 120 88 138 Q94 146 100 148 Z"
        fill="#43a047" stroke="#388e3c" stroke-width="1.5"/>
  <g fill="#388e3c" opacity="0.7">
    <circle cx="133" cy="118" r="4.5"/><circle cx="136" cy="108" r="4"/><circle cx="132" cy="128" r="4"/>
    <circle cx="123" cy="150" r="3.5"/><circle cx="112" cy="88" r="3.5"/>
  </g>
  <!-- Top small pad -->
  <path d="M80 138 Q62 132 58 118 Q54 104 64 95 Q72 88 80 90 Q88 88 96 95 Q106 104 102 118 Q98 132 80 138 Z"
        fill="#66bb6a" stroke="#43a047" stroke-width="1.2"/>
  <g fill="#43a047" opacity="0.6">
